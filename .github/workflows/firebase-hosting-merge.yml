name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - v3
    paths:
      - "assets/**"
      - "public/**"
      - "index.html"
      - "src/**/*.ts"
      - "src/**/*.tsx"
      - "src/**/*.js"
      - "src/**/*.jsx"
      - "src/**/*.css"
      - "src/**/*.scss"
      - "vite.config.*"
      - "tsconfig*.json"
      - "package.json"
      - "pnpm-lock.yaml"
  
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-deploy
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Ensure Vite cache directory exists
        run: mkdir -p node_modules/.vite

      - name: Cache Vite
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: vite-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Validate required environment variables
        run: |
          required_vars=(
            VITE_FIREBASE_API_KEY
            VITE_FIREBASE_AUTH_DOMAIN
            VITE_FIREBASE_PROJECT_ID
            VITE_FIREBASE_STORAGE_BUCKET
            VITE_FIREBASE_MESSAGING_SENDER_ID
            VITE_FIREBASE_APP_ID
            VITE_FIREBASE_MEASUREMENT_ID
            VITE_RECAPTCHA_ENTERPRISE_KEY
          )

          for var in "${required_vars[@]}"; do
            if [ -z "${{ secrets[var] }}" ]; then
              echo "❌ Missing required secret: $var"
              exit 1
            fi
          done

      - name: Create .env.local
        run: |
          cat <<EOF > .env.local
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_RECAPTCHA_ENTERPRISE_KEY=${{ secrets.VITE_RECAPTCHA_ENTERPRISE_KEY }}
          EOF

      - name: Build the website
        run: pnpm run build

      - name: Verify build output
        run: test -d build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ANWESHAN_DEV }}
          projectId: anweshan-dev
          target: anweshan-dev
          channelId: live
          force: true