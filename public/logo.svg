<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="gradPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#40f005"/>
      <stop offset="100%" stop-color="#039659"/>
    </linearGradient>
    
    <linearGradient id="gradAccent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#04c3ad"/>
      <stop offset="100%" stop-color="#40f005"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#039659" stroke-width="1" opacity="0.15"/>
      <circle cx="0" cy="0" r="1.5" fill="#04c3ad" opacity="0.4"/>
    </pattern>
  </defs>

  <circle cx="256" cy="256" r="256" fill="#030f00" />
  
  <circle cx="256" cy="256" r="240" fill="url(#grid)" />

  <circle cx="256" cy="256" r="220" fill="none" stroke="#039659" stroke-width="2" opacity="0.4" stroke-dasharray="4 8" />
  <circle cx="256" cy="256" r="230" fill="none" stroke="#04c3ad" stroke-width="1" opacity="0.2" />
  
  <circle cx="256" cy="36" r="4" fill="#40f005" filter="url(#glow)"/>
  <circle cx="36" cy="256" r="4" fill="#04c3ad" filter="url(#glow)"/>
  <circle cx="476" cy="256" r="4" fill="#04c3ad" filter="url(#glow)"/>
  <circle cx="256" cy="476" r="4" fill="#40f005" filter="url(#glow)"/>

  <path d="M 120 220 L 80 256 L 120 292" fill="none" stroke="#039659" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.3" filter="url(#glow)"/>
  <path d="M 392 220 L 432 256 L 392 292" fill="none" stroke="#039659" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.3" filter="url(#glow)"/>

  <path d="M 160 160 L 160 110 L 100 110 L 100 80" fill="none" stroke="#04c3ad" stroke-width="2" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="100" cy="80" r="3" fill="#eefee6" opacity="0.8"/>
  <path d="M 352 160 L 352 110 L 412 110 L 412 80" fill="none" stroke="#40f005" stroke-width="2" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="412" cy="80" r="3" fill="#eefee6" opacity="0.8"/>

  <g filter="url(#glow)">
    
    <path d="M 256 110 L 140 370 L 190 370 L 256 220 Z" fill="url(#gradPrimary)" />
    
    <path d="M 256 110 L 372 370 L 322 370 L 256 220 Z" fill="url(#gradAccent)" opacity="0.85" />
    
    <polygon points="215,280 297,280 307,310 205,310" fill="#eefee6" />
    <line x1="220" y1="295" x2="292" y2="295" stroke="#030f00" stroke-width="4" stroke-linecap="round"/>
    
    <polygon points="256,70 286,120 256,140 226,120" fill="#eefee6" />
    <circle cx="256" cy="115" r="8" fill="#030f00" />
    <circle cx="256" cy="115" r="3" fill="#40f005" />
    
    <rect x="135" y="370" width="60" height="8" fill="#039659" rx="4"/>
    <rect x="317" y="370" width="60" height="8" fill="#04c3ad" rx="4"/>
  </g>
  
  <path d="M 205 310 L 150 430" fill="none" stroke="#40f005" stroke-width="2" stroke-dasharray="5 5" opacity="0.6"/>
  <path d="M 307 310 L 362 430" fill="none" stroke="#04c3ad" stroke-width="2" stroke-dasharray="5 5" opacity="0.6"/>
  <circle cx="150" cy="430" r="4" fill="#eefee6" filter="url(#glow)"/>
  <circle cx="362" cy="430" r="4" fill="#eefee6" filter="url(#glow)"/>
</svg>
